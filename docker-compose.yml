services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    profiles: ["pipeline"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse_net

  minio:
    image: minio/minio:latest
    container_name: minio
    profiles: ["pipeline"]
    restart: unless-stopped
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse_net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    profiles: ["pipeline"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/lakehouse 2>/dev/null || echo 'Bucket already exists';
      /usr/bin/mc anonymous set public myminio/lakehouse 2>/dev/null || echo 'Policy already set';
      exit 0;
      "
    networks:
      - lakehouse_net

  iceberg-rest:
    image: tabulario/iceberg-rest:0.6.0
    container_name: iceberg-rest
    profiles: ["pipeline"]
    ports:
      - "${CATALOG_PORT}:8181"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      CATALOG_WAREHOUSE: ${CATALOG_WAREHOUSE}
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      CATALOG_JDBC_USER: ${POSTGRES_USER}
      CATALOG_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - lakehouse_net

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse
    profiles: ["pipeline", "streaming", "replay"]
    mem_limit: 2g
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_PORT}:8123"
      - "${CLICKHOUSE_NATIVE_PORT}:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./src/clickhouse/clickhouse-config.d:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse_net

  airflow-db-init:
    image: postgres:16-alpine
    container_name: airflow-db-init
    profiles: ["pipeline"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      psql -h postgres -U ${POSTGRES_USER} -d postgres -c \"SELECT 1 FROM pg_database WHERE datname = 'airflow'\" | grep -q 1 || psql -h postgres -U ${POSTGRES_USER} -d postgres -c \"CREATE DATABASE airflow\";
      "
    networks:
      - lakehouse_net

  airflow-init:
    image: apache/airflow:2.9.3-python3.12
    container_name: airflow-init
    profiles: ["pipeline"]
    depends_on:
      airflow-db-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    entrypoint: bash -c "airflow db migrate"
    networks:
      - lakehouse_net

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow-webserver
    profiles: ["pipeline"]
    mem_limit: 1g
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      airflow-db-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Ho_Chi_Minh
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      PYTHONPATH: /opt/airflow/src
      MINIO_ENDPOINT: http://minio:9000
      CATALOG_URI_CLIENT: http://iceberg-rest:8181
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./logs:/opt/airflow/logs
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    command: >
      bash -c "airflow users create --username ${AIRFLOW_ADMIN_USERNAME:-admin} --password ${AIRFLOW_ADMIN_PASSWORD:-admin} --firstname Stock --lastname Lakehouse --role Admin --email admin@example.com || true &&
      airflow webserver"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 240s
    networks:
      - lakehouse_net

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow-scheduler
    profiles: ["pipeline"]
    mem_limit: 1g
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Ho_Chi_Minh
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      PYTHONPATH: /opt/airflow/src
      MINIO_ENDPOINT: http://minio:9000
      CATALOG_URI_CLIENT: http://iceberg-rest:8181
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./logs:/opt/airflow/logs
    command: bash -c "airflow scheduler"
    networks:
      - lakehouse_net

  streamlit:
    build:
      context: .
      dockerfile: streamlit_app/Dockerfile
    container_name: streamlit
    profiles: ["pipeline", "streaming", "replay"]
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./streamlit_app:/app
      - ./src:/app/src
    environment:
      PYTHONPATH: /app/src
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_OHLC: dnse.ohlc
      DNSE_API_KEY: ${DNSE_API_KEY}
      DNSE_API_SECRET: ${DNSE_API_SECRET}
      DNSE_WS_URL: ${DNSE_WS_URL}
      DNSE_ENCODING: ${DNSE_ENCODING}
      OHLC_RESOLUTION: ${OHLC_RESOLUTION}
    ports:
      - "${STREAMLIT_PORT:-8502}:8501"
    networks:
      - lakehouse_net

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    profiles: ["streaming"]
    restart: unless-stopped
    user: "0:0"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: DOCKER_INTERNAL://0.0.0.0:9092,HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: DOCKER_INTERNAL://kafka:9092,HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER_INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER_INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/logs
    volumes:
      - kafka_data:/var/lib/kafka/logs
    networks:
      - lakehouse_net

  ohlc-producer:
    build:
      context: .
      dockerfile: streamlit_app/Dockerfile
    container_name: ohlc-producer
    profiles: ["streaming"]
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_started
    working_dir: /app
    volumes:
      - ./streamlit_app:/app
      - ./src:/app/src
    command: >
      sh -c "PYTHONPATH=/app/src python -m stock_lakehouse.streaming.producer.ohlc_producer"
    environment:
      PYTHONPATH: /app/src
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_OHLC: dnse.ohlc
      DNSE_API_KEY: ${DNSE_API_KEY}
      DNSE_API_SECRET: ${DNSE_API_SECRET}
      DNSE_WS_URL: ${DNSE_WS_URL}
      DNSE_ENCODING: ${DNSE_ENCODING}
      OHLC_RESOLUTION: ${OHLC_RESOLUTION}
    networks:
      - lakehouse_net

  streaming-init:
    build:
      context: .
      dockerfile: streamlit_app/Dockerfile
    container_name: streaming-init
    profiles: ["streaming", "replay"]
    depends_on:
      clickhouse:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./src:/app/src
    command: ["python", "-m", "stock_lakehouse.streaming.clickhouse.init"]
    environment:
      PYTHONPATH: /app/src
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_OHLC: dnse.ohlc
    networks:
      - lakehouse_net

  alert-detector:
    build:
      context: .
      dockerfile: src/stock_lakehouse/streaming/alerts/Dockerfile
    container_name: alert-detector
    profiles: ["streaming", "replay"]
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      streaming-init:
        condition: service_completed_successfully
    command: ["python", "-m", "stock_lakehouse.streaming.alerts.detector", "--reset-today"]
    environment:
      PYTHONPATH: /app/src
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      SLACK_DNSE_WEBHOOK: ${SLACK_DNSE_WEBHOOK:-}
      ALERT_BAND_MODE: ${ALERT_BAND_MODE:-sigma}
      ALERT_THRESHOLD_PCT: ${ALERT_THRESHOLD_PCT:-1.5}
      BAND_SIGMA_MULTIPLIER: ${BAND_SIGMA_MULTIPLIER:-2.0}
      RSI_PERIOD: ${RSI_PERIOD:-14}
      RSI_OVERBOUGHT: ${RSI_OVERBOUGHT:-70}
      RSI_OVERSOLD: ${RSI_OVERSOLD:-30}
      VOLUME_LOOKBACK: ${VOLUME_LOOKBACK:-20}
      VOLUME_SPIKE_RATIO: ${VOLUME_SPIKE_RATIO:-3.0}
      POLL_INTERVAL_SEC: ${DETECTOR_POLL_INTERVAL_SEC:-10}
      ALERT_COOLDOWN_SEC: ${ALERT_COOLDOWN_SEC:-300}
      CANDLE_BUFFER_SIZE: ${CANDLE_BUFFER_SIZE:-50}
      ALERT_SYMBOLS: ${ALERT_SYMBOLS:-FPT,VCB,HPG,VNM,MWG}
    networks:
      - lakehouse_net

  alert-detector-live:
    build:
      context: .
      dockerfile: src/stock_lakehouse/streaming/alerts/Dockerfile
    container_name: alert-detector-live
    profiles: ["streaming"]
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      streaming-init:
        condition: service_completed_successfully
    command: ["python", "-m", "stock_lakehouse.streaming.alerts.detector"]
    environment:
      PYTHONPATH: /app/src
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      SLACK_DNSE_WEBHOOK: ${SLACK_DNSE_WEBHOOK:-}
      ALERT_BAND_MODE: ${ALERT_BAND_MODE:-sigma}
      ALERT_THRESHOLD_PCT: ${ALERT_THRESHOLD_PCT:-1.5}
      BAND_SIGMA_MULTIPLIER: ${BAND_SIGMA_MULTIPLIER:-2.0}
      RSI_PERIOD: ${RSI_PERIOD:-14}
      RSI_OVERBOUGHT: ${RSI_OVERBOUGHT:-70}
      RSI_OVERSOLD: ${RSI_OVERSOLD:-30}
      VOLUME_LOOKBACK: ${VOLUME_LOOKBACK:-20}
      VOLUME_SPIKE_RATIO: ${VOLUME_SPIKE_RATIO:-3.0}
      POLL_INTERVAL_SEC: ${DETECTOR_POLL_INTERVAL_SEC:-10}
      ALERT_COOLDOWN_SEC: ${ALERT_COOLDOWN_SEC:-300}
      CANDLE_BUFFER_SIZE: ${CANDLE_BUFFER_SIZE:-50}
      ALERT_SYMBOLS: ${ALERT_SYMBOLS:-FPT,VCB,HPG,VNM,MWG}
    networks:
      - lakehouse_net

volumes:
  postgres_data:
  minio_data:
  clickhouse_data:
  kafka_data:

networks:
  lakehouse_net:
    name: lakehouse_network
